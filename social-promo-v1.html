<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irish Fishing Hub - Social Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg-dark: #05070a;
            --accent: #22d3ee;
            --glass: rgba(15, 23, 42, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 9:16 Aspect Ratio Container */
        .ad-canvas {
            width: 100vw;
            height: 177.77vw; /* 9:16 aspect */
            max-width: 450px;
            max-height: 800px;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 60px 40px;
        }

        /* Animated Background Elements */
        .bg-glow {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.1) 0%, transparent 60%);
            top: -25%;
            left: -25%;
            animation: pulse 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        .headline {
            font-size: 52px;
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .headline span {
            color: var(--accent);
            display: block;
        }

        .mockup-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .phone-mock {
            width: 220px;
            height: 440px;
            background: #1e293b;
            border-radius: 36px;
            border: 6px solid #334155;
            position: relative;
            transform: rotateY(-15deg) rotateX(5deg);
            box-shadow: 20px 40px 60px rgba(0,0,0,0.6);
            overflow: hidden;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: rotateY(-15deg) rotateX(5deg) translateY(0); }
            50% { transform: rotateY(-10deg) rotateX(2deg) translateY(-20px); }
        }

        /* Simplified App UI Mock */
        .app-ui {
            width: 100%;
            height: 100%;
            background: #020617;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .app-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            height: 60px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .app-chart {
            background: linear-gradient(180deg, rgba(0,242,255,0.2) 0%, transparent 100%);
            border-radius: 12px;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .wave-line {
            position: absolute;
            bottom: 30%;
            width: 200%;
            height: 40px;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: wave-move 3s linear infinite;
        }

        @keyframes wave-move {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .footer {
            text-align: center;
            margin-top: auto;
        }

        .cta {
            background: var(--primary);
            color: var(--bg-dark);
            padding: 20px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 18px;
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.4);
            text-transform: uppercase;
        }

        .url {
            font-size: 12px;
            opacity: 0.5;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .tag-cloud {
            position: absolute;
            bottom: 120px;
            left: 0;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 0 20px;
        }

        .tag {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>
    <div class="ad-canvas">
        <div class="bg-glow"></div>
        
        <div class="content">
            <div class="header">
                <span class="logo-text">Irish Fishing Hub</span>
                <h1 class="headline">RE-THINK<br><span>THE TIDE.</span></h1>
            </div>

            <div class="mockup-container">
                <div class="phone-mock">
                    <div class="app-ui">
                        <div class="app-card"></div>
                        <div class="app-chart">
                            <div class="wave-line"></div>
                        </div>
                        <div class="app-card" style="height: 40px;"></div>
                    </div>
                </div>
            </div>

            <div class="tag-cloud">
                <span class="tag">Live Tides</span>
                <span class="tag">Community</span>
                <span class="tag">Weather</span>
                <span class="tag">Fish ID</span>
            </div>

            <div class="footer">
                <a href="#" class="cta">Master The Coast</a>
                <div class="url">IRISHFISHINGHUB.COM</div>
            </div>
        </div>
    </div>
</body>
</html>
