<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ireland Tides - Professional Ad Mockup</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #02040a;
            --neon-blue: #00f2ff;
            --neon-glow: rgba(0, 242, 255, 0.4);
            --phone-bezel: #1e293b;
            --accent-cyan: #22d3ee;
        }

        body {
            background: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* The 'Zone' - Premium Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.05) 0%, transparent 50%);
            z-index: 1;
        }

        /* Pixel-Perfect Phone Frame */
        .phone-frame {
            width: 360px;
            height: 740px;
            background: var(--phone-bezel);
            border-radius: 50px;
            padding: 12px;
            position: relative;
            z-index: 10;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .phone-inner {
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar / Notch Area */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: var(--phone-bezel);
            border-radius: 0 0 20px 20px;
            z-index: 20;
        }

        /* Ad Content Container */
        .ad-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 50px 30px 40px;
            background: linear-gradient(180deg, rgba(0, 242, 255, 0.03) 0%, transparent 50%);
        }

        /* Alignment Fixes */
        .branding {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-label {
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .headline {
            font-size: 48px;
            font-weight: 900;
            line-height: 0.9;
            color: white;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .headline span {
            color: var(--accent-cyan);
            display: block;
        }

        /* The Main Visual / Mockup Screen */
        .feature-box {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin: auto 0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .tide-viz {
            height: 140px;
            position: relative;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            color: white;
        }

        /* Animated High-End Graph */
        .wave-path {
            fill: none;
            stroke: var(--neon-blue);
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px var(--neon-glow));
        }

        /* Footer Alignment */
        .footer {
            margin-top: auto;
            text-align: center;
        }

        .cta-btn {
            background: var(--neon-blue);
            color: var(--bg-deep);
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            text-decoration: none;
            box-shadow: 0 10px 25px var(--neon-glow);
            transition: transform 0.2s;
        }

        .url-tag {
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #475569;
            letter-spacing: 2px;
        }

        /* Subtle Decor */
        .decoration-blur {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--neon-glow);
            filter: blur(100px);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0.2;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="phone-frame">
        <div class="notch"></div>
        <div class="phone-inner">
            <div class="decoration-blur"></div>

            <div class="ad-content">
                <div class="branding">
                    <div class="logo-label">Ireland Tides</div>
                </div>

                <h1 class="headline">
                    MASTER<br>
                    <span>THE COAST.</span>
                </h1>

                <div class="feature-box">
                    <div class="stat-row">
                        <div>
                            <div class="stat-label">Current Level</div>
                            <div class="stat-value">3.4m</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="stat-label" style="color: var(--neon-blue);">Status</div>
                            <div style="font-weight: 700; color: white;">Rising High</div>
                        </div>
                    </div>

                    <div class="tide-viz">
                        <svg width="100%" height="100%" viewBox="0 0 300 120">
                            <path class="wave-path" d="M10,100 Q60,20 120,80 T260,40" />
                            <circle cx="260" cy="40" r="4" fill="var(--neon-blue)">
                                <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite" />
                            </circle>
                        </svg>
                    </div>

                    <div
                        style="font-size: 9px; color: #475569; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                        STATION: SOUTH STACK // ACCURACY: 99.8%
                    </div>
                </div>

                <div class="footer">
                    <a href="#" class="cta-btn">Get Precision Access</a>
                    <div class="url-tag">IRISHFISHINGHUB.COM</div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
